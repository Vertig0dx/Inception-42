version: '3.8'

volumes:
    wordpress:
        name: wordpress
        driver: local
        driver_opts:
            device: /home/lmiguel/data/wordpress
            o: bind
            type: none
    mariadb:
        name: mariadb
        driver: local
        driver_opts:
            devide: /home/lmiguel/data/mariadb
            o: bind
            type: none

networks:
    inception:
        name: inception

services:
    nginx:
        container_name: nginx

        build: ./mandatory/nginx/.

        ports:
            - 443:443

        restart: always

        depends_on:
           - wordpress

    wordpress:
      container_name: wordpress_php

      build: mandatory/wordpress/.